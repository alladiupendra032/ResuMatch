services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: resumatch-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        value: mongodb+srv://upendraalladi032_db_user:ALLADI%40UPENDRA88@cluster0.ztx1mgx.mongodb.net/resumatch?appName=Cluster0
      - key: DATABASE_NAME
        value: resumatch
      - key: JWT_SECRET_KEY
        value: resumatch-super-secret-jwt-key-production-2024
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE_MB
        value: "10"

  # ── Frontend (React/Vite static site) ────────────────────────────────────────
  - type: web
    name: resumatch-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://resumatch-backend.onrender.com
